// Supabase REST helper (no SDK needed — plain fetch)
const supaFetch = async (cfg, table, method = "GET", body = null, params = "") => {
  const url = `${cfg.url}/rest/v1/${table}${params}`;
  const headers = {
    "Content-Type": "application/json",
    "apikey": cfg.anonKey,
    "Authorization": `Bearer ${cfg.anonKey}`,
    "Prefer": method === "POST" ? "return=minimal" : "return=representation",
  };
  const res = await fetch(url, { method, headers, body: body ? JSON.stringify(body) : undefined });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(`Supabase ${method} ${table}: ${res.status} ${err}`);
  }
  if (method === "DELETE" || method === "POST") return true;
  const text = await res.text();
  return text ? JSON.parse(text) : [];
};

      }

    return null;

function printFinancialStatement(payments, expenses, students, feeStructures, termFilter) {
  const tPay  = termFilter ? payments.filter(p=>p.term===termFilter) : payments;
  const tExp  = termFilter ? expenses.filter(e=>e.term===termFilter) : expenses;
  const totalIncome   = tPay.reduce((a,p)=>a+Number(p.amount_paid||0),0);
  const totalExpenses = tExp.reduce((a,e)=>a+Number(e.amount||0),0);
  const netBalance    = totalIncome - totalExpenses;
  const termLabel     = termFilter ? `Term ${termFilter}` : "All Terms";
  const now           = new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"});

  // Income by fee type
  const incomeByType = FEE_TYPES.map(t=>({type:t,amount:tPay.filter(p=>p.fee_type===t).reduce((a,p)=>a+Number(p.amount_paid||0),0)})).filter(x=>x.amount>0);
  // Expenses by category
  const expByCategory = EXP_CATS.map(c=>({cat:c,amount:tExp.filter(e=>e.category===c).reduce((a,e)=>a+Number(e.amount||0),0)})).filter(x=>x.amount>0);
  // Outstanding per class
  const classBalances = CLASSES.map(cls=>{
    const classStudents = students.filter(s=>s.class_name===cls&&s.status==="active");
    const owed = classStudents.reduce((a,s)=>{const structs=feeStructures.filter(f=>f.class_name===cls&&(!termFilter||f.term===termFilter));return a+structs.reduce((x,f)=>x+Number(f.amount||0),0);},0);
    const paid = classStudents.reduce((a,s)=>a+tPay.filter(p=>p.student_id===s.id).reduce((x,p)=>x+Number(p.amount_paid||0),0),0);
    return {cls, students:classStudents.length, owed, paid, bal:Math.max(0,owed-paid)};
  }).filter(x=>x.students>0||x.owed>0);

  const rowsIncome  = incomeByType.map((r,i)=>`<tr style="background:${i%2===0?"#fff":"#f9fafb"}"><td style="padding:9px 12px">${r.type}</td><td style="padding:9px 12px;text-align:right;font-weight:700;color:#16a34a">SSP ${Number(r.amount).toLocaleString()}</td><td style="padding:9px 12px;text-align:right;color:#6b7280">${totalIncome>0?((r.amount/totalIncome)*100).toFixed(1):0}%</td></tr>`).join("");
  const rowsExp     = expByCategory.map((r,i)=>`<tr style="background:${i%2===0?"#fff":"#f9fafb"}"><td style="padding:9px 12px">${r.cat}</td><td style="padding:9px 12px;text-align:right;font-weight:700;color:#dc2626">SSP ${Number(r.amount).toLocaleString()}</td><td style="padding:9px 12px;text-align:right;color:#6b7280">${totalExpenses>0?((r.amount/totalExpenses)*100).toFixed(1):0}%</td></tr>`).join("");
  const rowsClass   = classBalances.map((r,i)=>`<tr style="background:${i%2===0?"#fff":"#f9fafb"}"><td style="padding:9px 12px;font-weight:600">${r.cls}</td><td style="padding:9px 12px;text-align:center;color:#6b7280">${r.students}</td><td style="padding:9px 12px;text-align:right">SSP ${Number(r.owed).toLocaleString()}</td><td style="padding:9px 12px;text-align:right;color:#16a34a;font-weight:700">SSP ${Number(r.paid).toLocaleString()}</td><td style="padding:9px 12px;text-align:right;color:${r.bal>0?"#dc2626":"#16a34a"};font-weight:700">SSP ${Number(r.bal).toLocaleString()}</td></tr>`).join("");

  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Financial Statement — ${termLabel}</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',Arial,sans-serif;background:#fff;color:#111827;font-size:13px;padding:28px;max-width:800px;margin:0 auto}table{width:100%;border-collapse:collapse}th{background:#1d4ed8;color:#fff;padding:9px 12px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px}td{border-bottom:1px solid #f3f4f6}@media print{body{padding:0}@page{margin:15mm;size:A4}}</style>
</head><body>
<div style="text-align:center;margin-bottom:24px;padding-bottom:18px;border-bottom:3px solid #1d4ed8">
  <div style="font-size:22px;font-weight:900;color:#1d4ed8">🏫 SOUTH SUDAN HIGH SCHOOL</div>
  <div style="font-size:11px;color:#6b7280;margin-top:3px">Juba, South Sudan · Tel: +211 900 000 000</div>
  <div style="margin-top:10px;display:inline-block;background:#1d4ed8;color:#fff;padding:4px 22px;border-radius:20px;font-size:12px;font-weight:800;letter-spacing:2px">FINANCIAL STATEMENT — ${termLabel.toUpperCase()}</div>
  <div style="font-size:11px;color:#9ca3af;margin-top:6px">Printed: ${now} · Academic Year ${new Date().getFullYear()}</div>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:22px">
  <div style="background:#f0fdf4;border:1px solid #86efac;border-radius:10px;padding:14px;text-align:center"><div style="font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:6px">Total Income</div><div style="font-size:24px;font-weight:900;color:#16a34a">SSP ${Number(totalIncome).toLocaleString()}</div></div>
  <div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:10px;padding:14px;text-align:center"><div style="font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:6px">Total Expenses</div><div style="font-size:24px;font-weight:900;color:#dc2626">SSP ${Number(totalExpenses).toLocaleString()}</div></div>
  <div style="background:${netBalance>=0?"#eff6ff":"#fef2f2"};border:1px solid ${netBalance>=0?"#93c5fd":"#fca5a5"};border-radius:10px;padding:14px;text-align:center"><div style="font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:6px">Net Balance</div><div style="font-size:24px;font-weight:900;color:${netBalance>=0?"#2563eb":"#dc2626"}">SSP ${Math.abs(netBalance).toLocaleString()}<span style="font-size:13px"> ${netBalance>=0?"SURPLUS":"DEFICIT"}</span></div></div>
</div>
${incomeByType.length>0?`<div style="margin-bottom:20px"><div style="font-weight:800;font-size:13px;color:#16a34a;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid #e5e7eb">💵 Income Breakdown</div><table><thead><tr><th>Fee Type</th><th style="text-align:right">Amount (SSP)</th><th style="text-align:right">% of Total</th></tr></thead><tbody>${rowsIncome}</tbody><tfoot><tr style="background:#f0fdf4;border-top:2px solid #16a34a"><td style="padding:9px 12px;font-weight:800">TOTAL INCOME</td><td style="padding:9px 12px;text-align:right;font-weight:900;color:#16a34a">SSP ${Number(totalIncome).toLocaleString()}</td><td></td></tr></tfoot></table></div>`:""}
${expByCategory.length>0?`<div style="margin-bottom:20px"><div style="font-weight:800;font-size:13px;color:#dc2626;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid #e5e7eb">📤 Expense Breakdown</div><table><thead><tr><th>Category</th><th style="text-align:right">Amount (SSP)</th><th style="text-align:right">% of Total</th></tr></thead><tbody>${rowsExp}</tbody><tfoot><tr style="background:#fef2f2;border-top:2px solid #dc2626"><td style="padding:9px 12px;font-weight:800">TOTAL EXPENSES</td><td style="padding:9px 12px;text-align:right;font-weight:900;color:#dc2626">SSP ${Number(totalExpenses).toLocaleString()}</td><td></td></tr></tfoot></table></div>`:""}
${classBalances.length>0?`<div style="margin-bottom:20px"><div style="font-weight:800;font-size:13px;color:#9333ea;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid #e5e7eb">📋 Fee Collection by Class</div><table><thead><tr><th>Class</th><th style="text-align:center">Students</th><th style="text-align:right">Total Due</th><th style="text-align:right">Collected</th><th style="text-align:right">Outstanding</th></tr></thead><tbody>${rowsClass}</tbody></table></div>`:""}
<div style="border-top:2px solid #e5e7eb;padding-top:14px;margin-top:20px;display:grid;grid-template-columns:1fr 1fr;gap:14px">
  <div><div style="font-size:11px;font-weight:800;color:#374151;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">Prepared by (Finance Office)</div><div style="height:36px;border-bottom:1px solid #d1d5db;margin-bottom:16px"></div><div style="font-size:10px;color:#9ca3af">Name: _________________________ Signature: _________________</div></div>
  <div><div style="font-size:11px;font-weight:800;color:#374151;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">Approved by (Principal)</div><div style="height:36px;border-bottom:1px solid #d1d5db;margin-bottom:16px"></div><div style="font-size:10px;color:#9ca3af">Name: _________________________ Signature: _________________</div></div>
</div>
<script>window.onload=()=>window.print();<\/script></body></html>`;
  const blob=new Blob([html],{type:"text/html"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`FinancialStatement_${termLabel.replace(" ","")}.html`;a.click();URL.revokeObjectURL(url);

}

  const [prompt, setPrompt] = useState(null);
  const [dismissed, setDismissed] = useState(() => !!localStorage.getItem("pwa_dismissed"));
  const [installed, setInstalled] = useState(false);

  useEffect(() => {
    injectPWA();
    const handler = e => { e.preventDefault(); setPrompt(e); };
    window.addEventListener("beforeinstallprompt", handler);
    window.addEventListener("appinstalled", () => setInstalled(true));
    return () => window.removeEventListener("beforeinstallprompt", handler);
  }, []);

  const install = async () => {
    if (!prompt) return;
    prompt.prompt();
    const { outcome } = await prompt.userChoice;

    setPrompt(null);

  if (dismissed || installed || !prompt) return null;

function PinEntryModal({ user, onSuccess, onCancel }) {
  const [pin, setPin_] = useState("");
  const [err, setErr]  = useState("");
  const [attempts, setAttempts] = useState(0);

  const verify = (val) => {
    const entered = val || pin;
    if (entered.length < 4) return;
    if (checkPin(user.id, entered)) { setErr(""); onSuccess(); }
    else {
      const a = attempts + 1;
      setAttempts(a);
      setErr(a >= 3 ? "Too many wrong attempts. Please sign in again." : `Incorrect PIN. ${3-a} attempt${3-a!==1?"s":""} remaining.`);
      if (a >= 3) setTimeout(onCancel, 1500);
      setPin_("");
    }
  };

  const handleKey = (digit) => {
    const next = (pin + digit).slice(0, 4);
    setPin_(next);
    if (next.length === 4) verify(next);
  };
  const del = () => setPin_(p => p.slice(0, -1));

  return (
    React.createElement('div', { style: { position:"fixed", inset:0, background:"linear-gradient(135deg,#0f172a,#1e3a5f)", zIndex:3000, display:"flex", alignItems:"center", justifyContent:"center", padding:20 },}

  const toggle = (id) => setSelIds(prev => { const n=new Set(prev); n.has(id)?n.delete(id):n.add(id); return n; });

  const printAll = () => {
    const selected = pool.filter(p=>selIds.has(p.id));
    if (!selected.length) return;
    const SCHOOL = "South Sudan High School";
    const YEAR   = new Date().getFullYear();

    const cardHTML = selected.map(p => {

function App() {

  const { installPrompt, installed, swReady, install } = usePWA();
  const [showInstallBanner, setShowInstallBanner] = useState(false);
  useEffect(() => {
    if (installPrompt && !installed) {
      const t = setTimeout(() => setShowInstallBanner(true), 3000);
      return () => clearTimeout(t);
    }
  }, [installPrompt, installed]);

  // ── Session ──
  const [user, setUser] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem("sms_session") || "null");
      if (!saved) return null;
      if (saved.password) {
        const valid = resolveUser(saved.username, saved.password);
        return valid ? { ...valid } : saved;
      }
      return saved;
    } catch (e8) { return null; }
  });

  // ── 2FA state: after password OK, admin/principal must pass PIN ──
  const [pendingUser,   setPendingUser]   = useState(null); // user awaiting PIN
  const [pinVerified,   setPinVerified]   = useState(false);

  const [module,        setModule]        = useState("dashboard");
  const [toast,         setToast]         = useState(null);
  const [showSearch,    setShowSearch]    = useState(false);
  const [showBulkID,    setShowBulkID]    = useState(false);
  const [showCloudSetup, setShowCloudSetup] = useState(false);

  const showToast = (msg, type="success") => { setToast({msg,type}); setTimeout(()=>setToast(null), 2800); };

  // Called after successful password check
  const handleLogin = (u) => {
    if (ROLES_REQUIRING_2FA.includes(u.role)) {
      setPendingUser(u);   // show PIN screen
    } else {
      finalizeLogin(u);
    }
  };

  const finalizeLogin = (u) => {
    setPendingUser(null);
    setPinVerified(false);
    setUser(u);
    localStorage.setItem("sms_session", JSON.stringify(u));
  };

  const logout = () => {
    setUser(null);
    setPendingUser(null);
    setPinVerified(false);
    localStorage.removeItem("sms_session");
  };

  // ── Routing ──
  if (!user && !pendingUser) return React.createElement(LoginScreen, { onLogin: handleLogin,});

  // 2FA PIN step
  if (pendingUser && !pinVerified) {
    return React.createElement(PinStep, { user: pendingUser, onSuccess: ()=>finalizeLogin(pendingUser), onCancel: ()=>setPendingUser(null),});
  }

  // Student / parent portal
  if (user && (user.role === "student" || user.role === "parent")) {
    return React.createElement(StudentPortal, { currentUser: user, onLogout: logout,});
  }

  // ── Staff/Admin system ──

    admin:     ["dashboard","students","staff","academics","finance","homework","awards","notifications","messages","users"],
    principal: ["dashboard","students","staff","academics","finance","homework","awards","notifications","messages","users"],
    bursar:    ["dashboard","finance","notifications","messages"],
    teacher:   ["dashboard","academics","homework","awards","notifications","messages"],
    support:   ["students","messages"],
    librarian: ["students","messages"],

    {id:"academics",     icon:"📚", label:"Academics"},
    {id:"finance",       icon:"💰", label:"Finance"},
    {id:"homework",      icon:"📝", label:"Homework"},
    {id:"awards",        icon:"🏆", label:"Awards"},
    {id:"notifications", icon:"🔔", label:"Alerts"},
    {id:"messages",      icon:"💬", label:"Messages"},
    {id:"users",         icon:"👤", label:"Users"},

          , React.createElement('div', { style: { fontSize:22 },}, "🏫")
          , React.createElement('div', null
            , React.createElement('div', { style: { fontSize:14, fontWeight:800, color:"#1d4ed8", lineHeight:1 },}, "SchoolSMS")
            , React.createElement('div', { style: { fontSize:9, color:"#9ca3af" },}, "South Sudan High School"   )
          )
          , swReady && React.createElement('span', { style: { fontSize:9, background:"#f0fdf4", color:"#16a34a", border:"1px solid #86efac", borderRadius:20, padding:"2px 7px", fontWeight:700 },}, "📶 Offline Ready"  )
        )

        , React.createElement('div', { style: { display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" },}
          , React.createElement('button', { onClick: ()=>setShowBulkID(true), style: { background:"#f3f4f6", color:"#374151", border:"1px solid #e5e7eb", borderRadius:8, padding:"6px 12px", fontSize:11, fontWeight:700, cursor:"pointer" },}, "🪪 Bulk ID"  )
          , React.createElement('button', { onClick: ()=>setShowSearch(true),  style: { background:"#f3f4f6", color:"#374151", border:"1px solid #e5e7eb", borderRadius:8, padding:"6px 12px", fontSize:11, fontWeight:700, cursor:"pointer" },}, "🔍 Search" )
          , installPrompt && !installed && (
            React.createElement('button', { onClick: ()=>{install();setShowInstallBanner(false);}, style: { background:"linear-gradient(135deg,#1e3a8a,#2563eb)", color:"#fff", border:"none", borderRadius:8, padding:"6px 12px", fontSize:11, fontWeight:700, cursor:"pointer" },}, "📱 Install App"  )
          )

          , React.createElement('button', { onClick: logout, style: { background:"#fee2e2", color:"#dc2626", border:"1px solid #fca5a5", borderRadius:8, padding:"5px 12px", fontSize:11, fontWeight:700, cursor:"pointer" },}, "Sign Out" )
        )
      )

      /* ── Cloud Sync Status ── */
      , React.createElement(CloudSyncBar, { onOpenSetup: () => setShowCloudSetup(true),} )

      , activeModule==="messages"      && React.createElement(MessagingModule, {       currentUser: user, toast: showToast,})
      , activeModule==="users"         && React.createElement(UserManagementModule, {  currentUser: user, toast: showToast,})
    )

}
